{% extends 'base.html' %}
{% block title %}Start Session – AMS{% endblock %}

{% block content %}
<div class="card">
  <a href="{{ url_for('index') }}" class="back-link">&#8592; Home</a>
  <h1>Start Session</h1>
  <p class="subtitle">Fill in the details below</p>

  <form method="POST" action="{{ url_for('start_session_submit') }}">
    <div class="form-group">
      <label for="session_name">Session Name</label>
      <input type="text" id="session_name" name="session_name"
             placeholder="e.g. Python Basics – Day 3"
             required autofocus />
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" name="date" value="{{ today }}" required />
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">
      Start Session
    </button>
  </form>
</div>
{% endblock %}
